---
name: Backport — post checklist

on:
  workflow_run:
    workflows: ["Backport — detect packages"]
    types: [completed]

jobs:
  post-checklist:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      pull-requests: write
      # Required by actions/download-artifact when fetching from another workflow run.
      actions: read

    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: .go-version

      - name: Install mage
        run: go install github.com/magefile/mage

      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          name: pr-packages-${{ github.event.workflow_run.id }}
          path: artifacts

      - name: Post or update checklist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          ARTIFACT: artifacts/pr-packages.json
        run: |
          if [[ ! -f "$ARTIFACT" ]]; then
            echo "Artifact not found — exiting"
            exit 0
          fi

          PR_NUMBER=$(jq -r '.pr_number' "$ARTIFACT")

          # Find an existing checklist comment (first match wins).
          # --jq with --paginate emits one JSON object per matching comment;
          # [0] keeps only the first so we update rather than duplicate.
          EXISTING=$(gh api "repos/$REPOSITORY/issues/$PR_NUMBER/comments" \
            --paginate \
            --jq '[.[] | select(.body | contains("<!-- backport-checklist -->"))][0] // {}')

          COMMENT_ID=$(jq -r '.id // empty' <<< "$EXISTING")
          EXISTING_BODY=$(jq -r '.body // empty' <<< "$EXISTING")

          # Render the new comment body. The existing body is piped into stdin so
          # the mage target can parse previously-checked branches and preserve their
          # state. Prints nothing when no package has any active branch.
          NEW_BODY=$(printf '%s' "$EXISTING_BODY" | \
            ARTIFACT="$ARTIFACT" mage -d "$GITHUB_WORKSPACE" renderBackportChecklist)

          if [[ -z "$NEW_BODY" ]]; then
            echo "No active backport branches — nothing to post"
            exit 0
          fi

          # Write to a file to avoid quoting issues when passing to gh api.
          BODY_FILE=$(mktemp)
          printf '%s' "$NEW_BODY" > "$BODY_FILE"

          if [[ -n "$COMMENT_ID" ]]; then
            gh api --method PATCH \
              "repos/$REPOSITORY/issues/comments/$COMMENT_ID" \
              --field body=@"$BODY_FILE"
            echo "Updated checklist comment #$COMMENT_ID on PR #$PR_NUMBER"
          else
            gh api --method POST \
              "repos/$REPOSITORY/issues/$PR_NUMBER/comments" \
              --field body=@"$BODY_FILE"
            echo "Created checklist comment on PR #$PR_NUMBER"
          fi

          rm -f "$BODY_FILE"
